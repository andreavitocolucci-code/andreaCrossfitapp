.pills{display:flex;gap:8px;padding:0 20px 14px;overflow-x:auto;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{padding:7px 16px;border-radius:20px;border:1px solid var(--bd);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;color:var(--gl);cursor:pointer;white-space:nowrap;background:var(--sf);}
.pill.on{background:var(--gr);color:#000;border-color:var(--gr);font-weight:700;}
.ccon{padding:0 14px;display:flex;flex-direction:column;gap:10px;}
.xcard{background:var(--sf);border-radius:14px;border:1px solid var(--bd);padding:14px;}
.xhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.xname{font-weight:600;font-size:16px;flex:1;padding-right:10px;}
.tlbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gl);letter-spacing:1px;text-align:center;}
.tval{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--gr);text-align:center;}
.xbody{display:flex;align-items:center;gap:10px;}
.vinp{flex:1;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--wh);outline:none;}

.twrap{display:flex;align-items:center;gap:4px;flex:1;}
.tinp{width:56px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 8px;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--wh);text-align:center;outline:none;}

.tsep{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--gy);}
.rbwrap{display:flex;align-items:center;gap:8px;}
.rwrap{position:relative;width:44px;height:44px;flex-shrink:0;}
.rtxt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;}
.lbtn{width:40px;height:40px;border-radius:10px;background:var(--gr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lbtn.z{background:var(--sf2);}

.wkgrid{padding:0 14px;}
.dcard{background:var(--sf);border-radius:14px;border:1px solid var(--bd);margin-bottom:10px;overflow:hidden;}
.dhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.dlft{display:flex;align-items:center;gap:12px;}
.dbadge{width:38px;height:38px;border-radius:10px;background:var(--sf2);border:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}

.dmon{font-size:8px;color:var(--gl);letter-spacing:1px;}

.dmod{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gr);color:#000;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;padding:10px 24px;border-radius:20px;opacity:0;pointer-events:none;transition:all .3s;z-index:300;}

.hidden{display:none!important;}

function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var vals = ld('acf_vals',{});
var scrs = ld('acf_scrs',{});

function findEx(id){
  var cats=Object.keys(EX);
  for(var i=0;i<cats.length;i++){
    var arr=EX[cats[i]];
    for(var j=0;j<arr.length;j++){
      if(arr[j].id===id) return arr[j];
    }
  }
  return null;
}

function pct(id){
  var e=findEx(id);
  if(!e) return 0;
  if(e.type==='time'){
    var t=vals[id]||'00:00';
    var parts=t.split(':');
    var a=parseInt(parts[0]||0)*60+parseInt(parts[1]||0);
    var tp=e.target.split(':');
    var tg=parseInt(tp[0]||0)*60+parseInt(tp[1]||0);
    if(!a||!tg) return 0;
    return Math.min(100,Math.round(tg/a*100));
  }
  var v=parseFloat(vals[id])||0;
  return Math.min(100,Math.round(v/e.target*100));
}

function mkRing(id){
  var sz=44,sw=4;
  var r=(sz-sw*2)/2;
  var ci=2*Math.PI*r;
  var p=pct(id);
  var of=(ci*(1-p/100)).toFixed(1);
  var cl=p>=100?'#39ff14':'#ff8c00';
  var sc=p===0?'#2a2a2a':cl;
  var svg='<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">';
  svg+='<circle cx="22" cy="22" r="'+r+'" fill="none" stroke="#2a2a2a" stroke-width="'+sw+'"/>';
  svg+='<circle cx="22" cy="22" r="'+r+'" fill="none" stroke="'+sc+'" stroke-width="'+sw+'"';
  svg+=' stroke-linecap="round" stroke-dasharray="'+ci.toFixed(1)+'" stroke-dashoffset="'+of+'"';
  svg+=' transform="rotate(-90 22 22)"/></svg>';
  return svg;
}

      inp+='</div>';
    } else {
      inp='<input class="vinp" type="number" placeholder="0" value="'+v+'" id="inp-'+e.id+'" oninput="upV(\''+e.id+'\',this.value)">';
    }

    var pTxt=p>=100?'>100':p;
    var btnCls=p===0?'lbtn z':'lbtn';
    var strk=p===0?'#555':'#000';

    var h='<div class="xhdr">';
    h+='<div class="xname">'+e.name+'</div>';
    h+='<div><div class="tlbl">TARGET</div><div class="tval">'+e.target+'</div></div>';
    h+='</div>';
    h+='<div class="xbody">'+inp;
    h+='<div class="rbwrap">';
    h+='<div class="rwrap" id="ring-'+e.id+'">'+mkRing(e.id)+'<div class="rtxt">'+pTxt+'%</div></div>';
    h+='<button class="'+btnCls+'" onclick="logEx(\''+e.id+'\')">';
    h+='<svg viewBox="0 0 24 24" fill="none" stroke="'+strk+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">';
    h+='<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></button>';
    h+='</div></div>';

    card.innerHTML=h;
    con.appendChild(card);
  }
}

function upV(id,v){vals[id]=v;sv('acf_vals',vals);refRing(id);}
function upT(id){
  var m=document.getElementById('min-'+id);
  var s=document.getElementById('sec-'+id);
  var mv=m?m.value:'0';
  var sv2=s?s.value:'0';
  vals[id]=pad(mv)+':'+pad(Math.min(59,parseInt(sv2)||0));
  sv('acf_vals',vals);refRing(id);
}
function pad(n){return String(n).padStart(2,'0');}
function refRing(id){
  var p=pct(id);
  var rw=document.getElementById('ring-'+id);
  if(rw) rw.innerHTML=mkRing(id)+'<div class="rtxt">'+(p>=100?'>100':p)+'%</div>';
}
function logEx(id){sv('acf_vals',vals);showToast('SALVATO');}

function buildWeek(){
  var grid=document.getElementById('week-grid');
  grid.innerHTML='';
  for(var i=0;i<WEEK.length;i++){
    var d=WEEK[i];
    var dc=document.createElement('div');
    dc.className='dcard';

    if(d.rest){
      dc.innerHTML='<div class="dhdr" style="cursor:default"><div class="dlft">'
        +'<div class="dbadge"><div class="dnum">'+d.date+'</div><div class="dmon">'+d.month+'</div></div>'
        +'<div><div class="dname">'+d.day+'</div><div class="dmod" style="color:#555">REST DAY</div></div>'
        +'</div><span style="font-size:24px">&#128564;</span></div>';
      grid.appendChild(dc);
      continue;
    }

    var sc=scrs['sc'+i]||'';
    var bh='';
    for(var b=0;b<d.blocks.length;b++){
      var bl=d.blocks[b];
      bh+='<div class="wkblock">';
      bh+='<div class="btag">'+bl.tag+'</div>';
      for(var s=0;s<bl.secs.length;s++){
        bh+='<div class="bsec">'+bl.secs[s].t+'</div>';
        bh+='<div class="btxt">'+bl.secs[s].b+'</div>';
      }
      bh+='</div>';
    }

    var idx=i;
    dc.innerHTML='<div class="dhdr" onclick="tgDay('+idx+')">'
      +'<div class="dlft">'
      +'<div class="dbadge"><div class="dnum">'+d.date+'</div><div class="dmon">'+d.month+'</div></div>'
      +'<div><div class="dname">'+d.day+'</div><div class="dmod" style="color:'+d.mc+'">'+d.mod+'</div></div>'
      +'</div><div class="dchev" id="chev'+idx+'">&#9660;</div></div>'
      +'<div class="dbody" id="body'+idx+'">'+bh
      +'<div class="score-row"><span class="slbl">SCORE:</span>'
      +'<input class="sinp" placeholder="il tuo score..." value="'+sc+'" id="sc'+idx+'" oninput="scrs[\'sc'+idx+'\']=this.value">'
      +'<button class="sbtn" onclick="svSc('+idx+')">SALVA</button></div></div>';

    grid.appendChild(dc);
  }
}

function tgDay(i){
  var b=document.getElementById('body'+i);
  var c=document.getElementById('chev'+i);
  if(b) b.classList.toggle('op');
  if(c) c.classList.toggle('op');
}
function svSc(i){
  var inp=document.getElementById('sc'+i);
  if(inp) scrs['sc'+i]=inp.value;
  sv('acf_scrs',scrs);
  showToast('SCORE SALVATO');
}

function buildStats(){
  var list=document.getElementById('stats-list');
  list.innerHTML='';
  var tot=0,cnt=0;
  var cats=Object.keys(EX);
  for(var c=0;c<cats.length;c++){
    var cat=cats[c];
    var lbl=document.createElement('div');
    lbl.className='sclbl';
    lbl.textContent=cat.toUpperCase();
    list.appendChild(lbl);
    var exs=EX[cat];
    for(var i=0;i<exs.length;i++){
      var e=exs[i];
      var p=pct(e.id);tot+=p;cnt++;
      var cl=p>=100?'#39ff14':p>=60?'#ff8c00':'#555';
      var row=document.createElement('div');
      row.className='srow';
      var vd=e.type==='time'?(vals[e.id]||'--'):(vals[e.id]||'0')+(e.type==='kg'?' kg':' reps');
      var tg=e.target+(e.type==='kg'?' kg':e.type==='reps'?' reps':'');
      row.innerHTML='<div class="sname">'+e.name+'</div>'
        +'<div><div class="spct" style="color:'+cl+'">'+p+'%</div>'
        +'<div class="sval">'+vd+' / '+tg+'</div></div>';
      list.appendChild(row);
    }
  }
  var avg=cnt?Math.round(tot/cnt):0;
  document.getElementById('opct').textContent=avg+'%';
  document.getElementById('osub').textContent='Media su '+cnt+' esercizi';
  var circ=2*Math.PI*34;
  document.getElementById('oring').style.strokeDashoffset=(circ*(1-avg/100)).toFixed(1);
}

function showPage(name){
  var pages=['massimali','week','stats'];
  for(var i=0;i<pages.length;i++){
    var el=document.getElementById('page-'+pages[i]);
    if(el) el.classList.toggle('hidden',pages[i]!==name);
  }
  var tabs=document.querySelectorAll('.ntab');
  for(var i=0;i<tabs.length;i++){
    tabs[i].classList.toggle('on',pages[i]===name);
  }
  if(name==='stats') buildStats();
}

function swCat(cat,el){
  var pills=document.querySelectorAll('.pill');
  for(var i=0;i<pills.length;i++) pills[i].classList.remove('on');
  el.classList.add('on');
  var cats=['gymnastic','weightlifting','strength','workout'];
  for(var i=0;i<cats.length;i++){
    var el2=document.getElementById('cat-'+cats[i]);
    if(el2) el2.classList.toggle('hidden',cats[i]!==cat);
  }
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},1800);
}

// INIT
var cats=Object.keys(EX);
for(var i=0;i<cats.length;i++) buildCards(cats[i]);
buildWeek();
</script>
